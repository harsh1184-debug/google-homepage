<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Google Homepage</title>
</head>

<body>
    <div class="container">
        <div class="logo">
            <img 
                src="https://pngimg.com/uploads/google/google_PNG19644.png"
                alt="Google Logo">
        </div>
        <div class="search-container">
            <input class="search-bar" type="text" placeholder="Search Google or type a URL">
        </div>
        <div class="buttons">
            <button class="search-button">Google Search</button>
            <button class="lucky-button">I'm Feeling Lucky</button>
        </div>
        
    </div>
</body>

</html>
